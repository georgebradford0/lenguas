services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build: ./api/v0
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/language-app
      - PORT=3000
    depends_on:
      - mongo

volumes:
  mongo-data:
