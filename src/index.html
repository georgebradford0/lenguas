<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>German SRS</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div id="stats-bar">
      <span id="stat-due">Due: 0</span>
      <span id="stat-new">New: 0</span>
      <span id="stat-reviewed">Reviewed: 0</span>
      <span id="stat-learned">Learned: 0</span>
    </div>

    <div id="card-container">
      <div id="card">
        <div id="word-row">
          <div id="word">Loading...</div>
          <button id="btn-speak" class="hidden" title="Play pronunciation">&#128264;</button>
        </div>
      </div>

      <div id="choices"></div>
    </div>

    <div id="done-message" class="hidden">
      <h2>Fertig!</h2>
      <p>No more cards due. Come back later.</p>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
