<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>German SRS</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div id="stats-bar">
      <span id="stat-due">Due: 0</span>
      <span id="stat-new">New: 0</span>
      <span id="stat-reviewed">Reviewed: 0</span>
      <span id="stat-learned">Learned: 0</span>
    </div>

    <div id="card-container">
      <div id="card">
        <div id="word">Loading...</div>
        <div id="card-info" class="hidden"></div>
      </div>

      <div id="show-container">
        <button id="btn-show">Show</button>
      </div>

      <div id="rating-container" class="hidden">
        <button class="rate-btn" data-rating="0">Again</button>
        <button class="rate-btn" data-rating="1">Hard</button>
        <button class="rate-btn" data-rating="2">Good</button>
        <button class="rate-btn" data-rating="3">Easy</button>
      </div>
    </div>

    <div id="done-message" class="hidden">
      <h2>Fertig!</h2>
      <p>No more cards due. Come back later.</p>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
